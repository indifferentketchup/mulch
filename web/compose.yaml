services:
  web:
    build:
      context: .
    ports:
      - "4217:3000"
    environment:
      IBLOGS_MONGODB_URL: "mongodb://mongo:27017"
      IBLOGS_MONGODB_DATABASE: "iblogs"
      ANALYZER_URL: "http://analyzer:8080"
    depends_on:
      mongo:
        condition: service_healthy
      analyzer:
        condition: service_started

  analyzer:
    build:
      context: ..
      dockerfile: web/analyze/Dockerfile
    ports:
      - "4219:8080"
    environment:
      PHP_CLI_SERVER_WORKERS: "4"

  mongo:
    image: mongo:8
    volumes:
      - mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo:
